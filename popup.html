<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Content Blocker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="glass_card header">
    <h3>SCB Elite</h3>
    <span class="status">● Active</span>
  </div>

  <div class="glass_card stats_container">
    <div class="stat_title">Elements Vaporized</div>
    <div class="stat_value" id="kill_count">0</div>
  </div>

  <div class="glass_card controls">
    <div class="toggle_row">
      <span>Soft Block Blur Mode</span>
      <label class="switch">
        <input type="checkbox" id="blur_toggle">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="glass_card input_section">
    <textarea id="keywords" placeholder="Add custom keywords separated by commas"></textarea>
    <button id="save">Save Configuration</button>
    <div id="msg" class="msg hidden">Saved successfully!</div>
  </div>
  
  <div class="credits">Made with ❤️ by pickko</div>

  <script src="popup.js"></script>
</body>
</html>

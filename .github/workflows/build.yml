name: Build Chrome Extension

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create Zip Archive
        run: |
          zip -r SCB-Elite-v3.zip . -x "*.git*" ".github/*" "README.md"
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: SCB-Elite-Extension
          path: SCB-Elite-v3.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Download Artifact
        uses: actions/download-artifact@v3
        with:
          name: SCB-Elite-Extension
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: SCB-Elite-v3.zip
          tag_name: v3.0.${{ github.run_number }}
          name: Release v3.0.${{ github.run_number }}
          body: Auto-generated release containing the packed SCB-Elite extension.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
